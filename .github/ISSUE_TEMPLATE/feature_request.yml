name: Feature request
description: Propose a focused improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What writing or knowledge-work problem should Inkstill solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: principles
    attributes:
      label: Project fit
      options:
        - label: This proposal keeps ordinary Markdown files as the source of truth.
          required: true
        - label: This proposal can work without requiring a cloud account.
          required: true
