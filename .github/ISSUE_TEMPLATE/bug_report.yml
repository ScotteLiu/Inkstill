name: Bug report
description: Report a reproducible Inkstill problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities here. Follow SECURITY.md instead.
  - type: input
    id: version
    attributes:
      label: Inkstill version
      placeholder: 1.1.0
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating system and version
      placeholder: Windows 11 24H2, macOS 15.5, or Ubuntu 24.04
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use a minimal document with no private information.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots or logs after removing sensitive content.
