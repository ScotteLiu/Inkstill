name: Windows unsigned final-candidate gate

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-windows-candidate:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.9.0
      - name: Build and verify unsigned final candidate
        run: pnpm release:candidate
      - name: Test Squirrel install and uninstall in disposable runner
        shell: powershell
        run: pnpm test:installer -DisposableEnvironment
      - name: Upload explicitly unsigned evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: inkstill-unsigned-candidate-${{ github.sha }}
          if-no-files-found: error
          path: |
            out/make/**
            release/**
      - name: Publish tagged preview release
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$env:GITHUB_REF_NAME" `
            "out/make/squirrel.windows/x64/Inkstill-1.1.0 Setup.exe#Windows x64 installer" `
            "out/make/zip/win32/x64/Inkstill-win32-x64-1.1.0.zip#Windows x64 portable" `
            "release/SHA256SUMS.txt#SHA-256 checksums" `
            "release/sbom.cdx.json#CycloneDX SBOM" `
            "release/THIRD_PARTY_LICENSES.md#Third-party licenses" `
            "release/build-manifest.json#Build manifest" `
            --verify-tag `
            --prerelease `
            --title "Inkstill 1.1.0 Preview" `
            --notes-file "docs/RELEASE_NOTES_1.1.0_PREVIEW.md"
