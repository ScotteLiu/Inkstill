name: Windows unsigned final-candidate gate

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  verify-windows-candidate:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.9.0
      - name: Build and verify unsigned final candidate
        run: pnpm release:candidate
      - name: Test Squirrel install and uninstall in disposable runner
        shell: powershell
        run: pnpm test:installer -DisposableEnvironment
      - name: Upload explicitly unsigned evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: inkstill-unsigned-candidate-${{ github.sha }}
          if-no-files-found: error
          path: |
            out/make/**
            release/**
      - name: Publish tagged preview release
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $package = Get-Content -LiteralPath "package.json" -Raw | ConvertFrom-Json
          $version = $package.version
          $setup = "out/make/squirrel.windows/x64/Inkstill-$version Setup.exe"
          $portable = "out/make/zip/win32/x64/Inkstill-win32-x64-$version.zip"
          $squirrelPackage = "out/make/squirrel.windows/x64/markdown_editor-$version-full.nupkg"
          $releaseNotes = "docs/RELEASE_NOTES_$($version.Replace('.', '_'))_PREVIEW.md"
          $updateManifest = Join-Path $env:RUNNER_TEMP "windows-preview.json"
          node scripts/generate-update-manifest.mjs `
            --tag "$env:GITHUB_REF_NAME" `
            --output "$updateManifest"
          gh release create "$env:GITHUB_REF_NAME" `
            "$setup#Windows x64 installer" `
            "$portable#Windows x64 portable" `
            "$squirrelPackage#Squirrel update package" `
            "out/make/squirrel.windows/x64/RELEASES#Squirrel update manifest" `
            "release/SHA256SUMS.txt#SHA-256 checksums" `
            "release/sbom.cdx.json#CycloneDX SBOM" `
            "release/THIRD_PARTY_LICENSES.md#Third-party licenses" `
            "release/build-manifest.json#Build manifest" `
            "$updateManifest#Windows preview update manifest" `
            --verify-tag `
            --prerelease `
            --title "Inkstill $version Preview" `
            --notes-file "$releaseNotes"

          # Publish the small, fixed-URL update channel only after every release
          # asset exists. GITHUB_TOKEN pushes do not recursively start workflows,
          # so Pages is dispatched explicitly after the channel commit.
          git fetch origin main
          git switch --force-create main origin/main
          New-Item -ItemType Directory -Force -Path "site/updates" | Out-Null
          Copy-Item -LiteralPath "$updateManifest" -Destination "site/updates/windows-preview.json" -Force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "site/updates/windows-preview.json"
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Update Windows preview channel to $version"
            git push origin main
            gh workflow run pages.yml --ref main
          }
