<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      * { box-sizing: border-box; }
      html, body { width: 1280px; height: 640px; margin: 0; overflow: hidden; }
      body {
        position: relative;
        color: #17352f;
        background:
          radial-gradient(circle at 6% 5%, rgba(31, 111, 95, 0.18), transparent 360px),
          radial-gradient(circle at 88% 12%, rgba(202, 164, 99, 0.15), transparent 310px),
          #f7f4ec;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .mark {
        position: absolute;
        top: 58px;
        left: 66px;
        display: flex;
        align-items: center;
        gap: 14px;
        font-size: 26px;
        font-weight: 760;
        letter-spacing: -0.03em;
      }
      .mark img { width: 48px; height: 48px; border-radius: 12px; }
      .copy {
        position: absolute;
        left: 66px;
        top: 174px;
        width: 545px;
      }
      h1 {
        margin: 0 0 24px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 72px;
        font-weight: 500;
        line-height: 0.98;
        letter-spacing: -0.058em;
      }
      p {
        width: 470px;
        margin: 0;
        color: #5e716b;
        font-size: 22px;
        line-height: 1.45;
      }
      .pills {
        position: absolute;
        left: 66px;
        bottom: 62px;
        display: flex;
        gap: 10px;
      }
      .pill {
        padding: 9px 14px;
        border: 1px solid rgba(23, 53, 47, 0.14);
        border-radius: 999px;
        color: #1f6f5f;
        background: rgba(255, 253, 248, 0.72);
        font-size: 15px;
        font-weight: 700;
      }
      .window {
        position: absolute;
        top: 74px;
        right: -152px;
        width: 715px;
        padding: 8px;
        border: 1px solid rgba(23, 53, 47, 0.14);
        border-radius: 18px;
        background: rgba(255, 253, 248, 0.8);
        box-shadow: 0 34px 85px rgba(24, 55, 48, 0.22);
        transform: rotate(-1.5deg);
      }
      .window img { display: block; width: 100%; border-radius: 11px; }
    </style>
  </head>
  <body>
    <div class="mark"><img src="../assets/icon.png" alt=""><span>Inkstill</span></div>
    <div class="copy">
      <h1>Write quietly.<br>Keep your files yours.</h1>
      <p>Open-source Markdown workspace for Windows.</p>
    </div>
    <div class="pills">
      <span class="pill">Local-first</span>
      <span class="pill">Live preview</span>
      <span class="pill">MIT licensed</span>
    </div>
    <div class="window">
      <img src="../docs/images/inkstill-split-preview.png" alt="">
    </div>
  </body>
</html>
